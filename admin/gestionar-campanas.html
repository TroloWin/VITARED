<div class="main">

<h2>Gestionar Campañas</h2>

<form id="campanaForm" class="mb-4">

<input type="hidden" id="campanaId">

<div class="row">

<div class="col-md-4">
<label>Nombre</label>
<input class="form-control" id="nombreCampana" required>
</div>

<div class="col-md-4">
<label>Lugar</label>
<input class="form-control" id="lugarCampana" required>
</div>

<div class="col-md-4">
<label>Fecha</label>
<input type="date" class="form-control" id="fechaCampana">
</div>

<div class="col-md-6 mt-3">
<label>Nombre de imagen</label>
<input class="form-control" id="imagenCampana" placeholder="ejemplo.jpg">
</div>

<div class="col-md-6 mt-3">
<label>Status</label>

<select class="form-select" id="statusCampana">

<option value="activa">Activa</option>
<option value="inactiva">Inactiva</option>
<option value="finalizada">Finalizada</option>

</select>

</div>

<!-- DESCRIPCION -->

<div class="col-12 mt-3">
<label>Descripción</label>
<textarea class="form-control" id="descripcionCampana" rows="3"></textarea>
</div>

</div>

<button class="btn btn-danger mt-3">
Guardar Campaña
</button>

</form>

<hr>

<table class="table">

<thead>

<tr>

<th>Imagen</th>
<th>Nombre</th>
<th>Lugar</th>
<th>Fecha</th>
<th>Status</th>
<th></th>

</tr>

</thead>

<tbody id="tablaCampanas"></tbody>

</table>

</div>


<script src="../public/js/firebase-config.js"></script>

<script>

async function cargarCampanas(){

const snapshot=await db.collection("campanas").get()

let html=""

snapshot.forEach(doc=>{

const c=doc.data()

let badge="warning"

if(c.status=="activa") badge="success"
if(c.status=="finalizada") badge="secondary"

html+=`

<tr>

<td>
<img src="../public/images/${c.imagen}" width="70">
</td>

<td>${c.nombre}</td>

<td>${c.lugar}</td>

<td>${c.fecha}</td>

<td>

<span class="badge bg-${badge}">
${c.status}
</span>

</td>

<td>

<button class="btn btn-primary btn-sm"
onclick="editarCampana('${doc.id}')">
Editar
</button>

<button class="btn btn-danger btn-sm"
onclick="eliminarCampana('${doc.id}')">
Eliminar
</button>

</td>

</tr>

`

})

tablaCampanas.innerHTML=html

}



campanaForm.addEventListener("submit",async e=>{

e.preventDefault()

const id=campanaId.value

const datos={

nombre:nombreCampana.value,
lugar:lugarCampana.value,
fecha:fechaCampana.value,
imagen:imagenCampana.value,
status:statusCampana.value,
descripcion:descripcionCampana.value

}

if(id){

await db.collection("campanas").doc(id).update(datos)

}else{

await db.collection("campanas").add(datos)

}

campanaForm.reset()
campanaId.value=""

cargarCampanas()

})



async function editarCampana(id){

const doc=await db.collection("campanas").doc(id).get()

const c=doc.data()

campanaId.value=id

nombreCampana.value=c.nombre
lugarCampana.value=c.lugar
fechaCampana.value=c.fecha
imagenCampana.value=c.imagen
statusCampana.value=c.status
descripcionCampana.value=c.descripcion || ""

}



async function eliminarCampana(id){

if(!confirm("¿Eliminar campaña?")) return

await db.collection("campanas").doc(id).delete()

cargarCampanas()

}



cargarCampanas()

</script>

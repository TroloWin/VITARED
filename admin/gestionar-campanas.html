<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VITARED | Gestionar Campañas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/public.css">
    <link rel="stylesheet" href="css/admin.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="admin-body">

<!-- SIDEBAR - 5 OPCIONES -->
<div class="sidebar">
    <div class="sidebar-header">
        <img src="../public/images/vitared_logo.png" alt="VITARED">
        <h3>Admin Panel</h3>
    </div>

    <div class="sidebar-nav">
        <ul>
            <li>
                <a href="dashboard.html">
                    <i class="fas fa-home"></i> Dashboard
                </a>
            </li>
            <li>
                <a href="gestionar-campanas.html" class="active">
                    <i class="fas fa-calendar-alt"></i> Gestionar Campañas
                </a>
            </li>
            <li>
                <a href="registro-donantes.html">
                    <i class="fas fa-user-plus"></i> Registro de Donantes
                </a>
            </li>
            <li>
                <a href="../index.html" target="_blank">
                    <i class="fas fa-globe"></i> Ver Página Web
                </a>
            </li>
            <li>
                <a href="#" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </a>
            </li>
        </ul>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    <div class="top-bar">
        <h2>Gestionar Campañas</h2>
    </div>

    <!-- FORMULARIO -->
    <div class="card shadow mb-4">
        <div class="card-header bg-danger text-white">
            <h5 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Nueva Campaña</h5>
        </div>
        <div class="card-body">
            <form id="campanaForm">
                <input type="hidden" id="campanaId">

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input class="form-control" id="nombreCampana" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Lugar</label>
                        <input class="form-control" id="lugarCampana" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Fecha</label>
                        <input type="date" class="form-control" id="fechaCampana">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Nombre de imagen</label>
                        <input class="form-control" id="imagenCampana" placeholder="ejemplo.jpg">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Cupo Máximo de Donantes</label>
                        <input type="number" class="form-control" id="cupoCampana" min="1" value="50" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select class="form-select" id="statusCampana">
                            <option value="activa">Activa</option>
                            <option value="inactiva">Inactiva</option>
                            <option value="finalizada">Finalizada</option>
                        </select>
                    </div>

                    <div class="col-12 mb-3">
                        <label class="form-label fw-semibold">Descripción</label>
                        <textarea class="form-control" id="descripcionCampana" rows="3"></textarea>
                    </div>
                </div>

                <button type="submit" class="btn btn-danger">
                    <i class="fas fa-save me-2"></i>Guardar Campaña
                </button>
            </form>
        </div>
    </div>

    <!-- TABLA DE CAMPAÑAS -->
    <div class="card shadow">
        <div class="card-header bg-danger text-white">
            <h5 class="mb-0"><i class="fas fa-list me-2"></i>Lista de Campañas</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Lugar</th>
                            <th>Fecha</th>
                            <th>Cupo</th>
                            <th>Status</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCampanas"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="../public/js/firebase-config.js"></script>
<script>
    let todasLasCampanas = [];

    // VERIFICAR AUTENTICACIÓN
    auth.onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = "../login/login.html";
            return;
        }
        cargarCampanas();
    });

    // CARGAR CAMPAÑAS
    async function cargarCampanas() {
        try {
            const snapshot = await db.collection("campanas")
                .orderBy("fecha", "desc")
                .get();

            const tabla = document.getElementById("tablaCampanas");
            let html = "";

            if (snapshot.empty) {
                tabla.innerHTML = '<tr><td colspan="7" class="text-center">No hay campañas</td></tr>';
                return;
            }

            // Para cada campaña, contar inscritos
            for (const doc of snapshot.docs) {
                const c = doc.data();
                const campanaId = doc.id;
                
                // Contar inscritos
                const inscritosSnap = await db.collection("inscripciones")
                    .where("campanaId", "==", campanaId)
                    .get();
                
                const cupoActual = inscritosSnap.size;
                
                let badge = c.status == "activa" ? "success" : 
                           c.status == "finalizada" ? "secondary" : "warning";

                html += `
                    <tr>
                        <td>
                            <img src="../public/images/${c.imagen || 'campana-default.jpg'}" 
                                 width="50" height="50" 
                                 style="object-fit:cover; border-radius:5px;">
                        </td>
                        <td>${c.nombre || ''}</td>
                        <td>${c.lugar || ''}</td>
                        <td>${c.fecha || ''}</td>
                        <td>
                            ${cupoActual}/${c.cupoMaximo || 50}
                            ${cupoActual >= (c.cupoMaximo || 50) ? 
                                '<span class="badge bg-danger ms-1">Lleno</span>' : ''}
                        </td>
                        <td><span class="badge bg-${badge}">${c.status || 'pendiente'}</span></td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="editarCampana('${campanaId}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="eliminarCampana('${campanaId}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }

            tabla.innerHTML = html;
        } catch (error) {
            console.error("Error cargando campañas:", error);
        }
    }

    // GUARDAR CAMPAÑA
    document.getElementById("campanaForm").addEventListener("submit", async e => {
        e.preventDefault();

        const id = document.getElementById("campanaId").value;
        const datos = {
            nombre: document.getElementById("nombreCampana").value,
            lugar: document.getElementById("lugarCampana").value,
            fecha: document.getElementById("fechaCampana").value,
            imagen: document.getElementById("imagenCampana").value,
            status: document.getElementById("statusCampana").value,
            descripcion: document.getElementById("descripcionCampana").value || "",
            cupoMaximo: parseInt(document.getElementById("cupoCampana").value) || 50
        };

        try {
            if (id) {
                await db.collection("campanas").doc(id).update(datos);
            } else {
                await db.collection("campanas").add(datos);
            }

            document.getElementById("campanaForm").reset();
            document.getElementById("campanaId").value = "";
            cargarCampanas();

        } catch (error) {
            console.error("Error guardando campaña:", error);
            alert("Error al guardar la campaña");
        }
    });

    // EDITAR CAMPAÑA
    window.editarCampana = async (id) => {
        try {
            const doc = await db.collection("campanas").doc(id).get();
            const c = doc.data();

            document.getElementById("campanaId").value = id;
            document.getElementById("nombreCampana").value = c.nombre || "";
            document.getElementById("lugarCampana").value = c.lugar || "";
            document.getElementById("fechaCampana").value = c.fecha || "";
            document.getElementById("imagenCampana").value = c.imagen || "";
            document.getElementById("statusCampana").value = c.status || "activa";
            document.getElementById("descripcionCampana").value = c.descripcion || "";
            document.getElementById("cupoCampana").value = c.cupoMaximo || 50;

        } catch (error) {
            console.error("Error editando campaña:", error);
            alert("Error al cargar la campaña");
        }
    };

    // ELIMINAR CAMPAÑA
    window.eliminarCampana = async (id) => {
        if (!confirm("¿Estás seguro de eliminar esta campaña?")) return;

        try {
            // Verificar si hay inscripciones
            const inscritosSnap = await db.collection("inscripciones")
                .where("campanaId", "==", id)
                .get();
            
            if (!inscritosSnap.empty) {
                alert("No se puede eliminar una campaña con donantes inscritos.");
                return;
            }

            await db.collection("campanas").doc(id).delete();
            cargarCampanas();
        } catch (error) {
            console.error("Error eliminando campaña:", error);
            alert("Error al eliminar la campaña");
        }
    };

    // LOGOUT
    function logout() {
        auth.signOut().then(() => {
            window.location.href = "../login/login.html";
        });
    }

    // HACER FUNCIONES GLOBALES
    window.logout = logout;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

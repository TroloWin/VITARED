<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../public/css/public.css">
<link rel="stylesheet" href="css/admin.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body class="admin-body">


<!-- SIDEBAR -->
<div class="sidebar">

<div class="sidebar-header">
<img src="../public/images/vitared_logo.png" alt="VITARED">
<h3>Admin Panel</h3>
</div>

<div class="sidebar-nav">

<ul>

<li>
<a href="dashboard.html" class="active">
<i class="fas fa-home"></i> Dashboard
</a>
</li>

<li>
<a href="gestionar-campanas.html">
<i class="fas fa-calendar-alt"></i> Gestionar Campañas
</a>
</li>

<li>
<a href="registro-donantes.html">
<i class="fas fa-user-plus"></i> Registro de Donantes
</a>
</li>

<li>
<a href="#" onclick="logout()">
<i class="fas fa-sign-out-alt"></i> Cerrar Sesión
</a>
</li>

</ul>

</div>
</div>



<!-- MAIN CONTENT -->
<div class="main-content">

<div class="top-bar">

<h2>Dashboard</h2>

<div class="user-info">

<span id="userName">Cargando...</span>

<div class="user-avatar" id="userAvatar">
A
</div>

</div>

</div>



<!-- ESTADÍSTICAS -->

<div class="row mb-4">

<div class="col-md-6">

<div class="card bg-danger text-white">

<div class="card-body">

<h5>Total Usuarios</h5>

<h2 id="totalUsuarios">0</h2>

</div>

</div>

</div>



<div class="col-md-6">

<div class="card bg-success text-white">

<div class="card-body">

<h5>Total Campañas</h5>

<h2 id="totalCampanas">0</h2>

</div>

</div>

</div>

</div>

</div>



<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">



<script src="../public/js/firebase-config.js"></script>



<script>

let currentUser = null;


// VERIFICAR LOGIN
auth.onAuthStateChanged(async (user) => {

if(!user){

window.location.href = "../login/login.html";
return;

}

currentUser = user;


// MOSTRAR NOMBRE O EMAIL

document.getElementById("userName").textContent =
user.displayName || user.email;


// AVATAR

document.getElementById("userAvatar").textContent =
(user.displayName || user.email).charAt(0).toUpperCase();


// CARGAR DASHBOARD

cargarDashboard();

});




// CARGAR DATOS

async function cargarDashboard(){

await cargarEstadisticas();

}




// ESTADÍSTICAS

async function cargarEstadisticas(){

// Usuarios

const usersSnap = await db.collection("users").get();

document.getElementById("totalUsuarios").textContent =
usersSnap.size;



// Campañas

const campanasSnap = await db.collection("campanas").get();

document.getElementById("totalCampanas").textContent =
campanasSnap.size;

}




// CERRAR SESIÓN

function logout(){

auth.signOut()

.then(()=>{

window.location.href = "../login/login.html";

})

.catch((error)=>{

console.error("Error al cerrar sesión:", error);

});

}

</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

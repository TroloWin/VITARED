<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Donantes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="../public/js/firebase-config.js"></script>

</head>


<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Campañas de Donación</h2>


<!-- TABLA CAMPAÑAS -->

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>Campaña</th>
<th>Ubicación</th>
<th>Fecha</th>
<th>Status</th>
<th>Ver Donantes</th>

</tr>

</thead>

<tbody id="tablaCampanas">

</tbody>

</table>



<!-- DONANTES DE CAMPAÑA -->

<div class="mt-5">

<h3>Donantes registrados</h3>

<table class="table table-striped">

<thead>

<tr>

<th>Nombre</th>
<th>Email</th>
<th>Tipo de sangre</th>
<th>Fecha</th>

</tr>

</thead>

<tbody id="tablaDonantes">

</tbody>

</table>

</div>

</div>



<script>

const tablaCampanas = document.getElementById("tablaCampanas");
const tablaDonantes = document.getElementById("tablaDonantes");


// CARGAR CAMPAÑAS

async function cargarCampanas(){

const snapshot = await db.collection("campanas").get();

tablaCampanas.innerHTML = "";

snapshot.forEach(doc => {

const data = doc.data();

let estado = "Activa";

if(data.estado){
estado = data.estado;
}

tablaCampanas.innerHTML += `

<tr>

<td>${data.titulo}</td>

<td>${data.ubicacion}</td>

<td>${data.fecha?.toDate().toLocaleDateString() || ""}</td>

<td>
<span class="badge bg-success">
${estado}
</span>
</td>

<td>

<button class="btn btn-primary btn-sm"
onclick="verDonantes('${data.titulo}')">

Ver Donantes

</button>

</td>

</tr>

`;

});

}


cargarCampanas();



// VER DONANTES DE UNA CAMPAÑA

async function verDonantes(tituloCampana){

tablaDonantes.innerHTML = "";


const snapshot = await db.collection("inscripciones")
.where("campana","==", tituloCampana)
.get();


if(snapshot.empty){

tablaDonantes.innerHTML = `
<tr>
<td colspan="4">No hay donantes registrados</td>
</tr>
`;

return;

}


snapshot.forEach(doc => {

const data = doc.data();

tablaDonantes.innerHTML += `

<tr>

<td>${data.nombre}</td>

<td>${data.correo}</td>

<td>${data.tipoSangre}</td>

<td>${data.createdAt?.toDate().toLocaleDateString() || ""}</td>

</tr>

`;

});

}

</script>

</body>
</html>

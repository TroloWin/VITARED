<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VITARED | Usuarios Registrados</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/public.css">
    <link rel="stylesheet" href="css/admin.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="admin-body">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-header">
        <img src="../public/images/vitared_logo.png" alt="VITARED">
        <h3>Admin Panel</h3>
    </div>
    <div class="sidebar-nav">
        <ul>
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="usuarios.html" class="active"><i class="fas fa-users"></i> Usuarios</a></li>
            <li><a href="campanas-admin.html"><i class="fas fa-calendar-alt"></i> Campañas</a></li>
            <li><a href="perfil.html"><i class="fas fa-user"></i> Mi Perfil</a></li>
            <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
        </ul>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    <div class="top-bar">
        <h2>Usuarios Registrados</h2>
        <div class="user-info" id="userInfo">
            <span id="userName">Cargando...</span>
            <div class="user-avatar" id="userAvatar">A</div>
        </div>
    </div>

    <!-- CONTENIDO -->
    <div class="card shadow">
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-6">
                    <input type="text" id="searchInput" class="form-control" placeholder="Buscar usuario...">
                </div>
                <div class="col-md-6 text-end">
                    <span id="userCount" class="badge bg-danger p-2">Cargando...</span>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Tipo Sangre</th>
                            <th>Localidad</th>
                            <th>¿Puede donar?</th>
                            <th>Donaciones</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="8" class="text-center">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>

            <nav id="pagination" class="mt-3">
                <ul class="pagination justify-content-center" id="paginationUl"></ul>
            </nav>
        </div>
    </div>
</div>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="../public/js/firebase-config.js"></script>
<script>
    let allUsers = [];
    let filteredUsers = [];
    let currentPage = 1;
    const usersPerPage = 10;

    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = '../login/login.html';
            return;
        }
        
        const rol = await verificarRolUsuario(user.uid);
        if (!rol.esAdmin) {
            window.location.href = '../index.html?error=unauthorized';
            return;
        }
        
        document.getElementById('userName').textContent = user.displayName || 'Admin';
        document.getElementById('userAvatar').textContent = (user.displayName || 'A').charAt(0).toUpperCase();
        
        loadUsers();
    });

    async function loadUsers() {
        const snapshot = await db.collection('users').get();
        
        allUsers = [];
        snapshot.forEach(doc => {
            allUsers.push({ id: doc.id, ...doc.data() });
        });
        
        // Ordenar por fecha de creación
        allUsers.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        
        filteredUsers = [...allUsers];
        updateUserCount();
        displayUsers();
    }

    function displayUsers() {
        const tbody = document.getElementById('usersTableBody');
        const start = (currentPage - 1) * usersPerPage;
        const end = start + usersPerPage;
        const usersToShow = filteredUsers.slice(start, end);

        if (usersToShow.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center">No hay usuarios</td></tr>';
            return;
        }

        let html = '';
        usersToShow.forEach((user, index) => {
            const fecha = user.createdAt?.toDate ? user.createdAt.toDate().toLocaleDateString() : '';
            
            html += `
                <tr>
                    <td>${start + index + 1}</td>
                    <td><strong>${user.nombre || '—'}</strong></td>
                    <td>${user.email || '—'}</td>
                    <td><span class="badge bg-danger">${user.tipoSangre || '—'}</span></td>
                    <td>${user.localidad || '—'}</td>
                    <td>
                        ${user.puedeDonar ? 
                            '<span class="badge bg-success">Sí</span>' : 
                            '<span class="badge bg-secondary">No</span>'
                        }
                    </td>
                    <td>${user.donacionesRealizadas || 0}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="verUsuario('${user.id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                        ${!user.esAdmin ? `
                            <button class="btn btn-sm btn-outline-danger" onclick="eliminarUsuario('${user.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        ` : ''}
                    </td>
                </tr>
            `;
        });

        tbody.innerHTML = html;
        updatePagination();
    }

    function updateUserCount() {
        document.getElementById('userCount').textContent = `${filteredUsers.length} usuarios encontrados`;
    }

    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        const term = e.target.value.toLowerCase();
        
        filteredUsers = allUsers.filter(user => 
            (user.nombre && user.nombre.toLowerCase().includes(term)) ||
            (user.email && user.email.toLowerCase().includes(term)) ||
            (user.localidad && user.localidad.toLowerCase().includes(term)) ||
            (user.tipoSangre && user.tipoSangre.toLowerCase().includes(term))
        );
        
        currentPage = 1;
        updateUserCount();
        displayUsers();
    });

    function updatePagination() {
        const totalPages = Math.ceil(filteredUsers.length / usersPerPage);
        const pagination = document.getElementById('paginationUl');
        
        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = '';
        
        // Anterior
        html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="changePage(${currentPage - 1}); return false;">Anterior</a>
        </li>`;
        
        // Páginas
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>
                </li>`;
            } else if (i === currentPage - 3 || i === currentPage + 3) {
                html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            }
        }
        
        // Siguiente
        html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="changePage(${currentPage + 1}); return false;">Siguiente</a>
        </li>`;
        
        pagination.innerHTML = html;
    }

    window.changePage = (page) => {
        currentPage = page;
        displayUsers();
    };

    window.verUsuario = (userId) => {
        // Podrías redirigir a una página de detalle
        alert(`Usuario ID: ${userId}\nFunción en desarrollo`);
    };

    window.eliminarUsuario = async (userId) => {
        if (!confirm('¿Eliminar este usuario? Esta acción no se puede deshacer')) return;
        
        try {
            await db.collection('users').doc(userId).delete();
            alert('Usuario eliminado');
            loadUsers();
        } catch (error) {
            alert('Error: ' + error.message);
        }
    };

    window.logout = () => {
        auth.signOut();
        window.location.href = '../index.html';
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

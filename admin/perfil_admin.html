<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil Admin | VITARED</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow mx-auto" style="max-width:500px;">
        <div class="card-body text-center">

            <img id="fotoPerfil"
                 src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                 width="100" height="100"
                 style="border-radius:50%; margin-bottom:15px;">

            <h3 id="nombrePerfil">Nombre</h3>
            <p id="emailPerfil" class="text-muted">correo@email.com</p>

            <hr>

            <div class="text-start">
                <label>Nombre:</label>
                <input type="text" id="inputNombre" class="form-control mb-2">

                <label>Foto (URL):</label>
                <input type="text" id="inputFoto" class="form-control mb-3">
            </div>

            <button class="btn btn-success w-100" onclick="guardarPerfil()">
                Guardar Cambios
            </button>

            <button class="btn btn-secondary w-100 mt-2" onclick="volver()">
                Volver
            </button>

        </div>
    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="../public/js/firebase-config.js"></script>

<script>
    let currentUser;

    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = "../login/login.html";
            return;
        }

        currentUser = user;

        const doc = await db.collection("users").doc(user.uid).get();

        if (doc.exists) {
            const data = doc.data();

            document.getElementById("nombrePerfil").textContent =
                data.nombre || "Admin";

            document.getElementById("emailPerfil").textContent =
                data.email || user.email;

            document.getElementById("inputNombre").value =
                data.nombre || "";

            document.getElementById("inputFoto").value =
                data.foto || "";

            if (data.foto) {
                document.getElementById("fotoPerfil").src = data.foto;
            }
        }
    });

    async function guardarPerfil() {
        const nombre = document.getElementById("inputNombre").value;
        const foto = document.getElementById("inputFoto").value;

        await db.collection("users").doc(currentUser.uid).set({
            nombre,
            foto,
            email: currentUser.email
        }, { merge: true });

        alert("Perfil actualizado 🔥");
        location.reload();
    }

    function volver() {
        window.location.href = "dashboard.html";
    }
</script>

</body>
</html>

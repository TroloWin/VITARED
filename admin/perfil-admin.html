<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Perfil Administrador</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../public/css/public.css">
<link rel="stylesheet" href="css/admin.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body class="admin-body">


<!-- SIDEBAR -->
<div class="sidebar">

<div class="sidebar-header">
<img src="../public/images/vitared_logo.png">
<h3>Admin Panel</h3>
</div>

<div class="admin-profile text-center p-3">

<div class="user-avatar" id="userAvatar">A</div>

<h6 id="userName">Admin</h6>

<p class="text-muted small">Administrador</p>

</div>

<div class="sidebar-nav">

<ul>

<li>
<a href="dashboard.html">
<i class="fas fa-home"></i> Dashboard
</a>
</li>

<li>
<a href="perfil-admin.html" class="active">
<i class="fas fa-user"></i> Perfil
</a>
</li>

<li>
<a href="gestionar-campanas.html">
<i class="fas fa-calendar-alt"></i> Gestionar Campañas
</a>
</li>

<li>
<a href="registro-donantes.html">
<i class="fas fa-user-plus"></i> Registro de Donantes
</a>
</li>

<li>
<a href="#" onclick="logout()">
<i class="fas fa-sign-out-alt"></i> Cerrar Sesión
</a>
</li>

</ul>

</div>

</div>



<!-- CONTENIDO -->
<div class="main-content">

<div class="top-bar">
<h2>Perfil del Administrador</h2>
</div>


<div class="card shadow p-4">

<div class="mb-3">

<label class="form-label">Nombre</label>

<input type="text" id="adminNombre" class="form-control">

</div>


<div class="mb-3">

<label class="form-label">Correo</label>

<input type="text" id="adminCorreo" class="form-control" disabled>

</div>


<button class="btn btn-danger" onclick="guardarPerfil()">
Guardar Cambios
</button>


</div>

</div>



<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="../public/js/firebase-config.js"></script>

<script>

let currentUser=null;

auth.onAuthStateChanged(user=>{

if(!user){

window.location.href="../login/login.html";
return;

}

currentUser=user;


// DATOS

document.getElementById("adminNombre").value=
user.displayName || "";

document.getElementById("adminCorreo").value=user.email;

document.getElementById("userName").textContent=
user.displayName || user.email;

document.getElementById("userAvatar").textContent=
(user.displayName || user.email).charAt(0).toUpperCase();

});



function guardarPerfil(){

const nombre=document.getElementById("adminNombre").value;

currentUser.updateProfile({

displayName:nombre

}).then(()=>{

alert("Perfil actualizado");

});

}



function logout(){

auth.signOut().then(()=>{

window.location.href="../login/login.html";

});

}

</script>

</body>
</html>

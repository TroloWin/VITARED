<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VITARED | Campañas de Donación</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="public/css/public.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm sticky-top">
    <div class="container py-2">
        <a class="navbar-brand" href="index.html">
            <img src="public/images/vitared_logo.png" alt="VITARED" style="width: 140px;">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="requisitos.html">Requisitos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="preguntas.html">Preguntas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="campanas.html">Campañas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="centros.html">Centros</a>
                </li>
            </ul>

            <div class="d-flex align-items-center" id="authButtons">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>
</nav>

<!-- HERO DE CAMPAÑAS -->
<section class="campanas-hero">
    <div class="container text-center">
        <h1 class="display-4 fw-bold text-white">Campañas de Donación</h1>
        <p class="lead text-white">Encuentra la campaña más cercana y participa</p>
    </div>
</section>

<!-- FILTROS -->
<section class="py-4 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control" placeholder="Buscar campañas...">
                    <button class="btn btn-danger" type="button" onclick="filtrarCampanas()">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                </div>
            </div>
            <div class="col-md-3">
                <select id="filtroActivas" class="form-select" onchange="filtrarCampanas()">
                    <option value="todas">Todas las campañas</option>
                    <option value="activas" selected>Solo activas</option>
                </select>
            </div>
        </div>
    </div>
</section>

<!-- LISTA DE CAMPAÑAS -->
<section class="py-5">
    <div class="container">
        <div id="campanasContainer" class="row">
            <div class="col-12 text-center">
                <div class="spinner-border text-danger" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2025 Donación de Sangre | Proyecto VITARED
</footer>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
.campanas-hero {
    height: 40vh;
    background: linear-gradient(rgba(139, 0, 0, 0.8), rgba(179, 0, 0, 0.8)),
                url('public/images/sangr2.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.campaign-card {
    transition: all 0.3s ease;
    border-radius: 15px;
    overflow: hidden;
    height: 100%;
}

.campaign-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

.campaign-card .card-img-top {
    height: 220px;
    object-fit: cover;
}

.destacada-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #ffc107;
    color: #000;
    padding: 5px 15px;
    border-radius: 25px;
    font-weight: bold;
    z-index: 10;
}
</style>

<script src="public/js/firebase-config.js"></script>
<script>
    let todasLasCampanas = [];

    // Cargar todas las campañas
    async function cargarCampanas() {
        const container = document.getElementById('campanasContainer');
        
        try {
            const campanas = await obtenerCampanas(false); // Obtener todas (activas e inactivas)
            todasLasCampanas = campanas;
            
            if (!campanas || campanas.length === 0) {
                container.innerHTML = '<p class="text-center">No hay campañas disponibles</p>';
                return;
            }
            
            mostrarCampanas(campanas);
        } catch (error) {
            console.error("Error cargando campañas:", error);
            container.innerHTML = '<p class="text-center text-danger">Error al cargar campañas</p>';
        }
    }

    // Mostrar campañas en grid
    function mostrarCampanas(campanas) {
        const container = document.getElementById('campanasContainer');
        
        if (campanas.length === 0) {
            container.innerHTML = '<p class="text-center">No se encontraron campañas</p>';
            return;
        }

        let html = '';
        campanas.forEach(c => {
            // Solo mostrar activas a usuarios no admin (el filtro ya lo maneja)
            if (!c.activa && !esAdmin) return;
            
            let fecha = 'Próximamente';
            if (c.fecha && c.fecha.toDate) {
                fecha = c.fecha.toDate().toLocaleDateString('es-ES', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }
            
            html += `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card campaign-card position-relative">
                        ${c.destacada ? '<div class="destacada-badge">⭐ Destacada</div>' : ''}
                        <img src="public/images/${c.imagen || 'campana-default.jpg'}" class="card-img-top" alt="${c.titulo}">
                        <div class="card-body">
                            <h5 class="text-danger fw-bold">${c.titulo || 'Sin título'}</h5>
                            <p>${c.descripcion || 'Sin descripción'}</p>
                            <p><strong>📍 ${c.ubicacion || 'Por definir'}</strong></p>
                            <p><strong>📅 ${fecha}</strong></p>
                            <p><strong>👥 Cupo: ${c.cupoActual || 0}/${c.cupoMaximo || 50}</strong></p>
                            ${!c.activa ? '<p><span class="badge bg-secondary">Finalizada</span></p>' : ''}
                            <button class="btn btn-danger" onclick="agendarCitaCampana('${c.id}')" ${!c.activa ? 'disabled' : ''}>
                                Agendar cita
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    // Filtrar campañas
    function filtrarCampanas() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filtroActivas = document.getElementById('filtroActivas').value;
        
        let filtradas = todasLasCampanas;
        
        // Filtrar por búsqueda
        if (searchTerm) {
            filtradas = filtradas.filter(c => 
                (c.titulo && c.titulo.toLowerCase().includes(searchTerm)) ||
                (c.ubicacion && c.ubicacion.toLowerCase().includes(searchTerm)) ||
                (c.descripcion && c.descripcion.toLowerCase().includes(searchTerm))
            );
        }
        
        // Filtrar por activas
        if (filtroActivas === 'activas') {
            filtradas = filtradas.filter(c => c.activa === true);
        }
        
        mostrarCampanas(filtradas);
    }

    // Agendar cita desde campaña
    window.agendarCitaCampana = async (campanaId) => {
        const user = auth.currentUser;
        if (!user) {
            window.location.href = 'login/login.html';
            return;
        }
        
        // Redirigir a perfil para agendar
        window.location.href = 'perfil.html?campana=' + campanaId;
    };

    // Control de autenticación
    let esAdmin = false;
    
    auth.onAuthStateChanged(async (user) => {
        const authDiv = document.getElementById('authButtons');
        
        if (user) {
            const rol = await verificarRolUsuario(user.uid);
            esAdmin = rol.esAdmin;
            
            if (esAdmin) {
                authDiv.innerHTML = `
                    <a href="admin/dashboard.html" class="btn btn-danger register-btn me-2">
                        Admin Panel
                    </a>
                    <button onclick="logout()" class="btn btn-outline-danger login-btn">
                        Cerrar Sesión
                    </button>
                `;
                // Recargar para mostrar campañas inactivas si es admin
                cargarCampanas();
            } else {
                authDiv.innerHTML = `
                    <span class="text-danger me-3">
                        <i class="fas fa-user"></i> ${user.displayName}
                    </span>
                    <a href="perfil.html" class="btn btn-outline-danger login-btn me-2">
                        Mi Perfil
                    </a>
                    <button onclick="logout()" class="btn btn-danger register-btn">
                        Cerrar Sesión
                    </button>
                `;
            }
        } else {
            authDiv.innerHTML = `
                <a href="login/login.html" class="btn btn-outline-danger login-btn me-2">
                    Iniciar Sesión
                </a>
                <a href="login/register.html" class="btn btn-danger register-btn">
                    Registrarse
                </a>
            `;
        }
    });

    window.logout = () => {
        auth.signOut();
        window.location.href = 'index.html';
    };

    // Cargar campañas al iniciar
    document.addEventListener('DOMContentLoaded', cargarCampanas);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

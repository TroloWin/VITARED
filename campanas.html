<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VITARED | Campañas de Donación</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="public/css/public.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<!-- NAVBAR (EXACTAMENTE IGUAL AL INDEX) -->
<nav class="navbar navbar-expand-lg shadow-sm sticky-top">
    <div class="container py-2">
        <a class="navbar-brand" href="index.html">
            <img src="public/images/vitared_logo.png" 
                 alt="VITARED" 
                 style="width:140px;">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="requisitos.html">Requisitos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="preguntas.html">Preguntas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="campanas.html">Campañas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="centros.html">Centros</a>
                </li>
            </ul>

            <div class="d-flex align-items-center" id="authButtons">
                <!-- Se llena dinámicamente IGUAL AL INDEX -->
            </div>
        </div>
    </div>
</nav>

<!-- HERO DE CAMPAÑAS (CON GRADIENTE) -->
<section class="campanas-hero">
    <div class="container text-center">
        <h1 class="display-4 fw-bold text-white">Campañas de Donación</h1>
        <p class="lead text-white">Encuentra la campaña más cercana y participa</p>
    </div>
</section>

<!-- LISTA DE CAMPAÑAS -->
<section class="py-5">
    <div class="container">
        <div id="campanasContainer" class="row">
            <div class="col-12 text-center">
                <div class="spinner-border text-danger" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2025 Donación de Sangre | Proyecto VITARED
</footer>

<!-- Font Awesome (solo para iconos de cards, no para navbar) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* ESTILOS DEL HERO */
.campanas-hero {
    height: 45vh;
    background: linear-gradient(rgba(139,0,0,0.7), rgba(179,0,0,0.7)),
                url('public/images/sangr2.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    color: white;
}

/* CARDS PROFESIONALES */
.campaign-card {
    transition: all 0.3s ease;
    border-radius: 15px;
    overflow: hidden;
    height: 100%;
    border: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.campaign-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

.campaign-card .card-img-top {
    height: 200px;
    object-fit: cover;
}

/* BOTONES */
.btn-danger {
    background: linear-gradient(90deg, #8B0000, #b30000);
    border: none;
    transition: 0.3s ease;
    color: white;
    font-weight: 500;
}

.btn-danger:hover:not(:disabled) {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(179,0,0,0.3);
}

.btn-danger:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn-outline-danger {
    border: 2px solid #dc3545;
    color: #dc3545;
    background: transparent;
    transition: 0.3s ease;
}

.btn-outline-danger:hover {
    background: #dc3545;
    color: white;
}

/* BADGES */
.badge {
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
    border-radius: 50px;
}

.badge-success {
    background-color: #28a745;
    color: white;
}

.badge-secondary {
    background-color: #6c757d;
    color: white;
}

.badge-danger {
    background-color: #dc3545;
    color: white;
}

/* TEXTO */
.text-danger {
    color: #8B0000 !important;
}

.section-title {
    color: #8B0000;
}
</style>

<script src="public/js/firebase-config.js"></script>
<script>
    let todasLasCampanas = [];

    // CARGAR CAMPAÑAS
    async function cargarCampanas() {
        const container = document.getElementById("campanasContainer");
        
        try {
            const snapshot = await db.collection("campanas")
                .orderBy("fecha", "desc")
                .get();

            const campanas = [];
            snapshot.forEach(doc => {
                campanas.push({
                    id: doc.id,
                    ...doc.data()
                });
            });

            todasLasCampanas = campanas;

            if (campanas.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center">
                        <p class="text-muted">No hay campañas disponibles.</p>
                    </div>`;
                return;
            }

            mostrarCampanas(campanas);
            
        } catch (error) {
            console.error("Error cargando campañas:", error);
            container.innerHTML = `
                <div class="col-12 text-center">
                    <p class="text-danger">Error al cargar las campañas</p>
                </div>`;
        }
    }

    // MOSTRAR CAMPAÑAS
    function mostrarCampanas(campanas) {
        const container = document.getElementById("campanasContainer");
        let html = "";

        campanas.forEach(c => {
            const estado = c.status || "inactiva";
            let badgeEstado = "";
            let botonDisabled = "";

            if (estado === "activa") {
                badgeEstado = '<span class="badge bg-success">Activa</span>';
            } else if (estado === "inactiva") {
                badgeEstado = '<span class="badge bg-secondary">Inactiva</span>';
                botonDisabled = "disabled";
            } else if (estado === "finalizada") {
                badgeEstado = '<span class="badge bg-danger">Finalizada</span>';
                botonDisabled = "disabled";
            }

            html += `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card campaign-card h-100">
                        <img src="public/images/${c.imagen || 'campana-default.jpg'}"
                             class="card-img-top"
                             alt="${c.nombre || 'Campaña'}">
                        <div class="card-body d-flex flex-column">
                            <h5 class="text-danger fw-bold">${c.nombre || 'Campaña de Donación'}</h5>
                            <p class="card-text flex-grow-1">${c.descripcion || 'Sin descripción'}</p>
                            <p><strong>📍 ${c.lugar || 'Lugar no especificado'}</strong></p>
                            <p><strong>📅 ${c.fecha || 'Fecha no especificada'}</strong></p>
                            <p class="mb-3">${badgeEstado}</p>
                            <button class="btn btn-danger w-100"
                                    onclick="inscribirseCampana('${c.id}')"
                                    ${botonDisabled}>
                                Inscribirme
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // INSCRIBIRSE A CAMPAÑA
    window.inscribirseCampana = async (campanaId) => {
        const user = auth.currentUser;

        if (!user) {
            window.location.href = "login/login.html";
            return;
        }

        try {
            const doc = await db.collection("campanas").doc(campanaId).get();
            const campana = doc.data();

            if (campana.status !== "activa") {
                alert("❌ Esta campaña no está disponible para inscripciones.");
                return;
            }

            // CONFIRMACIÓN
            const confirmar = confirm(
                `¿Confirmas tu inscripción?\n\n` +
                `📍 Lugar: ${campana.lugar || 'No especificado'}\n` +
                `📅 Fecha: ${campana.fecha || 'No especificada'}\n\n` +
                `Se generará tu ticket de donación.`
            );

            if (!confirmar) return;

            // GENERAR TICKET
            const ticket = "T-" + Date.now();

            await db.collection("inscripciones").add({
                userId: user.uid,
                userEmail: user.email,
                campanaId: campanaId,
                campanaNombre: campana.nombre || "",
                fechaCampana: campana.fecha || "",
                ticket: ticket,
                fechaRegistro: new Date().toLocaleString()
            });

            alert(`✅ ¡Inscripción exitosa!\n\nTu número de ticket es:\n${ticket}`);
            
        } catch (error) {
            console.error("Error al inscribirse:", error);
            alert("❌ Error al procesar la inscripción");
        }
    };

    // CONTROL DE AUTENTICACIÓN EN NAVBAR (EXACTAMENTE IGUAL AL INDEX)
    auth.onAuthStateChanged(async (user) => {
        const authDiv = document.getElementById('authButtons');
        
        if (user) {
            const rol = await verificarRolUsuario(user.uid);
            
            if (rol.esAdmin) {
                authDiv.innerHTML = `
                    <a href="admin/dashboard.html" class="btn btn-danger register-btn me-2">
                        Admin Panel
                    </a>
                    <button onclick="logout()" class="btn btn-outline-danger login-btn">
                        Cerrar Sesión
                    </button>
                `;
            } else {
                authDiv.innerHTML = `
                    <span class="text-danger me-3">
                        ${user.displayName || 'Usuario'}
                    </span>
                    <a href="perfil.html" class="btn btn-outline-danger login-btn me-2">
                        Mi Perfil
                    </a>
                    <button onclick="logout()" class="btn btn-danger register-btn">
                        Cerrar Sesión
                    </button>
                `;
            }
        } else {
            authDiv.innerHTML = `
                <a href="login/login.html" class="btn btn-outline-danger login-btn me-2">
                    Iniciar Sesión
                </a>
                <a href="login/register.html" class="btn btn-danger register-btn">
                    Registrarse
                </a>
            `;
        }
    });

    // LOGOUT
    window.logout = () => {
        auth.signOut().then(() => {
            window.location.href = "index.html";
        });
    };

    // CARGAR CAMPAÑAS AL INICIAR
    document.addEventListener("DOMContentLoaded", cargarCampanas);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

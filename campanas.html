        <p class="lead text-white">Encuentra la campaña más cercana y participa</p>

</section>

<!-- LISTA DE CAMPAÑAS -->
<section class="py-5">
    <div class="container">
        <div id="campanasContainer" class="row">
            <div class="col-12 text-center">
                <div class="spinner-border text-danger" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2025 Donación de Sangre | Proyecto VITARED
</footer>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
.campanas-hero {
    height: 45vh;
    background: linear-gradient(rgba(139,0,0,0.7), rgba(179,0,0,0.7)),
                url('public/images/sangr2.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    color: white;
}

.campaign-card {
    transition: all 0.3s ease;
    border-radius: 15px;
    overflow: hidden;
    height: 100%;
    border: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.campaign-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

.campaign-card .card-img-top {
    height: 200px;
    object-fit: cover;
}

.btn-danger {
    background: linear-gradient(90deg, #8B0000, #b30000);
    border: none;
    transition: 0.3s ease;
    color: white;
    font-weight: 500;
}

.btn-danger:hover:not(:disabled) {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(179,0,0,0.3);
}

.btn-danger:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.badge {
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
    border-radius: 50px;
}

.badge-success {
    background-color: #28a745;
    color: white;
}

.badge-secondary {
    background-color: #6c757d;
    color: white;
}

.badge-danger {
    background-color: #dc3545;
    color: white;
}

.badge-warning {
    background-color: #ffc107;
    color: black;
}

/* Estilo para el texto del cupo (visible en la tarjeta) */
.cupo-texto {
    font-size: 1rem;
    font-weight: 600;
    color: #8B0000;
    margin: 10px 0;
    padding: 5px 0;
    border-top: 1px solid #eee;
    border-bottom: 1px solid #eee;
}

.cupo-texto i {
    margin-right: 8px;
    color: #8B0000;
}

.text-danger {
    color: #8B0000 !important;
}
</style>

<script src="public/js/firebase-config.js"></script>
<script>
    let todasLasCampanas = [];
    let inscripcionesUsuario = [];

    // VERIFICAR INSCRIPCIONES DEL USUARIO
    async function cargarInscripcionesUsuario(userId) {
        try {
            const snapshot = await db.collection("inscripciones")
                .where("userId", "==", userId)
                .get();
            
            inscripcionesUsuario = [];
            snapshot.forEach(doc => {
                inscripcionesUsuario.push(doc.data());
            });
            console.log("Inscripciones del usuario:", inscripcionesUsuario);
        } catch (error) {
            console.error("Error cargando inscripciones:", error);
        }
    }

    // CARGAR CAMPAÑAS
    async function cargarCampanas() {
        const container = document.getElementById("campanasContainer");
        
        try {
            console.log("Cargando campañas...");
            
            // Obtener campañas
            const snapshot = await db.collection("campanas")
                .orderBy("fecha", "desc")
                .get();

            console.log("Documentos encontrados:", snapshot.size);
            
            const campanas = [];
            
            // Para cada campaña, contar inscritos
            for (const doc of snapshot.docs) {
                const campana = { id: doc.id, ...doc.data() };
                console.log("Campaña:", campana);
                
                // Contar inscritos de esta campaña
                const inscritosSnap = await db.collection("inscripciones")
                    .where("campanaId", "==", doc.id)
                    .get();
                
                campana.cupoActual = inscritosSnap.size;
                campanas.push(campana);
            }

            todasLasCampanas = campanas;

            if (campanas.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center">
                        <p class="text-muted">No hay campañas disponibles.</p>
                        <p class="text-muted small">(Verifica que existan documentos en la colección "campanas")</p>
                    </div>`;
                return;
            }

            mostrarCampanas(campanas);
            
        } catch (error) {
            console.error("Error cargando campañas:", error);
            container.innerHTML = `
                <div class="col-12 text-center">
                    <p class="text-danger">Error al cargar las campañas: ${error.message}</p>
                </div>`;
        }
    }

    // MOSTRAR CAMPAÑAS (CUPO VISIBLE EN LA TARJETA)
    function mostrarCampanas(campanas) {
        const container = document.getElementById("campanasContainer");
        let html = "";

        campanas.forEach(c => {
            const estado = c.status || "inactiva";
            
            let badgeEstado = "";
            let botonDisabled = "";
            let mensajeCupo = "";

            if (estado === "activa") {
                badgeEstado = '<span class="badge bg-success">Activa</span>';
                
                // Verificar si el usuario ya está inscrito en esta campaña
                const yaInscrito = inscripcionesUsuario.some(i => i.campanaId === c.id);
                
                // Verificar si el usuario ya está inscrito en otra campaña activa
                const otraCampana = inscripcionesUsuario.some(i => i.campanaId !== c.id);
                
                if (yaInscrito) {
                    botonDisabled = "disabled";
                    mensajeCupo = '<span class="badge bg-warning mt-2">Ya estás inscrito</span>';
                } else if (otraCampana) {
                    botonDisabled = "disabled";
                    mensajeCupo = '<span class="badge bg-warning mt-2">Ya tienes otra inscripción</span>';
                } else if (c.cupoActual >= c.cupoMaximo) {
                    botonDisabled = "disabled";
                    mensajeCupo = '<span class="badge bg-danger mt-2">Cupo lleno</span>';
                }
            } else {
                badgeEstado = estado === "inactiva" ? 
                    '<span class="badge bg-secondary">Inactiva</span>' : 
                    '<span class="badge bg-danger">Finalizada</span>';
                botonDisabled = "disabled";
            }

            html += `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card campaign-card h-100">
                        <img src="public/images/${c.imagen || 'campana-default.jpg'}"
                             class="card-img-top"
                             alt="${c.nombre || 'Campaña'}"
                             onerror="this.src='public/images/campana-default.jpg'">
                        <div class="card-body d-flex flex-column">
                            <h5 class="text-danger fw-bold">${c.nombre || 'Campaña de Donación'}</h5>
                            <p class="card-text flex-grow-1">${c.descripcion || 'Sin descripción'}</p>
                            <p><strong><i class="fas fa-map-marker-alt text-danger me-2"></i> ${c.lugar || 'Lugar no especificado'}</strong></p>
                            <p><strong><i class="fas fa-calendar-alt text-danger me-2"></i> ${c.fecha || 'Fecha no especificada'}</strong></p>
                            
                            <!-- CUPO VISIBLE EN LA TARJETA (5/50) -->
                            ${c.cupoMaximo ? `
                                <div class="cupo-texto">
                                    <i class="fas fa-users"></i> Cupo: ${c.cupoActual}/${c.cupoMaximo}
                                </div>
                            ` : ''}
                            
                            <p class="mb-2">${badgeEstado}</p>
                            ${mensajeCupo}
                            
                            <button class="btn btn-danger w-100 mt-3"
                                    onclick="inscribirseCampana('${c.id}')"
                                    ${botonDisabled}>
                                Inscribirme
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // INSCRIBIRSE A CAMPAÑA
    window.inscribirseCampana = async (campanaId) => {
        const user = auth.currentUser;

        if (!user) {
            window.location.href = "login/login.html";
            return;
        }

        try {
            // Verificar si ya está inscrito en otra campaña activa
            const inscripcionesSnap = await db.collection("inscripciones")
                .where("userId", "==", user.uid)
                .get();
            
            if (!inscripcionesSnap.empty) {
                alert("❌ Ya tienes una inscripción activa. No puedes inscribirte a más de una campaña.");
                return;
            }

            // Obtener datos de la campaña
            const doc = await db.collection("campanas").doc(campanaId).get();
            const campana = doc.data();

            if (campana.status !== "activa") {
                alert("❌ Esta campaña no está disponible para inscripciones.");
                return;
            }

            // Verificar cupo
            const inscritosSnap = await db.collection("inscripciones")
                .where("campanaId", "==", campanaId)
                .get();
            
            const cupoActual = inscritosSnap.size;
            
            if (cupoActual >= campana.cupoMaximo) {
                alert("❌ Esta campaña ya ha alcanzado su cupo máximo.");
                return;
            }

            // CONFIRMACIÓN
            const confirmar = confirm(
                `¿Confirmas tu inscripción?\n\n` +
                `📍 Lugar: ${campana.lugar || 'No especificado'}\n` +
                `📅 Fecha: ${campana.fecha || 'No especificada'}\n` +
                `Cupo disponible: ${cupoActual}/${campana.cupoMaximo}\n\n` +
                `Se generará tu ticket de donación.`
            );

            if (!confirmar) return;

            // GENERAR TICKET
            const ticket = "T-" + Date.now();

            await db.collection("inscripciones").add({
                userId: user.uid,
                userEmail: user.email,
                campanaId: campanaId,
                campanaNombre: campana.nombre || "",
                fechaCampana: campana.fecha || "",
                ticket: ticket,
                fechaRegistro: new Date().toLocaleString()
            });

            alert(`✅ ¡Inscripción exitosa!\n\nTu número de ticket es:\n${ticket}`);
            
            // Recargar campañas para actualizar contadores
            await cargarInscripcionesUsuario(user.uid);
            cargarCampanas();
            
        } catch (error) {
            console.error("Error al inscribirse:", error);
            alert("❌ Error al procesar la inscripción");
        }
    };

    // CONTROL DE AUTENTICACIÓN
    auth.onAuthStateChanged(async (user) => {
        const authDiv = document.getElementById('authButtons');
        
        if (user) {
            const rol = await verificarRolUsuario(user.uid);
            
            // Cargar inscripciones del usuario
            await cargarInscripcionesUsuario(user.uid);
            
            if (rol.esAdmin) {
                authDiv.innerHTML = `
                    <a href="admin/dashboard.html" class="btn btn-danger register-btn me-2">
                        Admin Panel
                    </a>
                    <button onclick="logout()" class="btn btn-outline-danger login-btn">
                        Cerrar Sesión
                    </button>
                `;
            } else {
                authDiv.innerHTML = `
                    <span class="text-danger me-3">
                        ${user.displayName || 'Usuario'}
                    </span>
                    <a href="perfil.html" class="btn btn-outline-danger login-btn me-2">
                        Mi Perfil
                    </a>
                    <button onclick="logout()" class="btn btn-danger register-btn">
                        Cerrar Sesión
                    </button>
                `;
            }
        } else {
            authDiv.innerHTML = `
                <a href="login/login.html" class="btn btn-outline-danger login-btn me-2">
                    Iniciar Sesión
                </a>
                <a href="login/register.html" class="btn btn-danger register-btn">
                    Registrarse
                </a>
            `;
        }
        
        // Cargar campañas después de actualizar auth
        cargarCampanas();
    });

    // LOGOUT
    window.logout = () => {
        auth.signOut().then(() => {
            window.location.href = "index.html";
        });
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

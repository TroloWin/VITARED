<!-- HERO -->

</div>

<!-- LISTA DE CAMPAÑAS -->
<section class="py-5">
<div class="container">
<div id="campanasContainer" class="row"></div>
</div>
</section>


<footer>
© 2025 Donación de Sangre | Proyecto VITARED

<script src="public/js/firebase-config.js"></script>

<script>

let todasLasCampanas=[];


// CARGAR CAMPAÑAS
async function cargarCampanas(){

const container=document.getElementById("campanasContainer")

const snapshot=await db.collection("campanas")
.orderBy("fecha","desc")
.get()

const campanas=[]

snapshot.forEach(doc=>{
campanas.push({
id:doc.id,
...doc.data()
})
})

todasLasCampanas=campanas

if(campanas.length===0){

container.innerHTML=`
<div class="text-center">
<p class="text-muted">No hay campañas disponibles.</p>
</div>`

return
}

mostrarCampanas(campanas)

}



function mostrarCampanas(campanas){

const container=document.getElementById("campanasContainer")

let html=""

campanas.forEach(c=>{

const estado=c.status || "inactiva"

let badgeEstado=""
let botonDisabled=""

if(estado==="activa"){
badgeEstado='<span class="badge bg-success">Activa</span>'
}

if(estado==="inactiva"){
badgeEstado='<span class="badge bg-secondary">Inactiva</span>'
botonDisabled="disabled"
}

if(estado==="finalizada"){
badgeEstado='<span class="badge bg-danger">Finalizada</span>'
botonDisabled="disabled"
}

html+=`

<div class="col-md-6 col-lg-4 mb-4">

<div class="card campaign-card h-100 shadow-sm">

<img src="public/images/${c.imagen || "campana-default.jpg"}"
class="card-img-top"
style="height:200px; object-fit:cover;">

<div class="card-body d-flex flex-column">

<h5 class="text-danger fw-bold">${c.nombre || "Campaña de Donación"}</h5>

<p>${c.descripcion || ""}</p>

<p><strong>📍 ${c.lugar || ""}</strong></p>

<p><strong>📅 ${c.fecha || ""}</strong></p>

<p>${badgeEstado}</p>

<div class="mt-auto">

<button class="btn btn-danger w-100"
onclick="inscribirseCampana('${c.id}')"
${botonDisabled}>
Inscribirme
</button>

</div>

</div>

</div>

</div>
`

})

container.innerHTML=html

}



// INSCRIBIRSE
window.inscribirseCampana=async(campanaId)=>{

const user=auth.currentUser

if(!user){

window.location.href="login/login.html"
return
}


const doc=await db.collection("campanas")
.doc(campanaId)
.get()

const campana=doc.data()

if(campana.status!=="activa"){

alert("❌ Esta campaña no está disponible.")
return

}


// GENERAR TICKET

const ticket="T-"+Date.now()


await db.collection("inscripciones").add({

userId:user.uid,
userEmail:user.email,
campanaId:campanaId,
campanaNombre:campana.nombre || "",
fechaCampana:campana.fecha || "",
ticket:ticket,
fechaRegistro:new Date()

})



alert("✅ Registro exitoso\n\nTu número de ticket es:\n"+ticket)


}



// BOTONES LOGIN
auth.onAuthStateChanged((user)=>{

const authDiv=document.getElementById("authButtons")

if(user){

authDiv.innerHTML=`

<a href="perfil.html" class="btn btn-outline-danger me-2">
Mi Perfil
</a>

<button onclick="logout()" class="btn btn-danger">
Cerrar Sesión
</button>

`

}else{

authDiv.innerHTML=`

<a href="login/login.html" class="btn btn-outline-danger me-2">
Iniciar Sesión
</a>

<a href="login/register.html" class="btn btn-danger">
Registrarse
</a>

`
}

})



window.logout=()=>{

auth.signOut()
window.location.href="index.html"

}



document.addEventListener("DOMContentLoaded",cargarCampanas)

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

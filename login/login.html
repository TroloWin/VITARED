<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITARED | Iniciar Sesión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/public.css">
    <link rel="stylesheet" href="css/login.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="../index.html">
            <img src="../public/images/vitared_logo.png" alt="VITARED" style="width: 140px;">
        </a>
    </div>
</nav>

<section class="login-section">
    <div class="col-md-5">
        <div class="login-card">
            <div class="login-header">
                <h2>Iniciar Sesión</h2>
                <p>Accede a tu cuenta VITARED</p>
            </div>

            <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>
            <div id="loadingAlert" class="alert alert-info" style="display: none;">Iniciando sesión...</div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="login-btn" id="submitBtn">
                        Iniciar Sesión
                    </button>
                </div>

                <div class="text-center">
                    <a href="recuperar.html" class="link-medical">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="text-center mt-4">
                    <span class="text-muted">¿No tienes cuenta?</span>
                    <a href="register.html" class="link-medical fw-bold">Regístrate aquí</a>
                </div>
            </form>
        </div>
    </div>
</section>

<footer>
    © 2025 Donación de Sangre | Proyecto VITARED
</footer>

<script src="../public/js/firebase-config.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const redirectUrl = params.get("redirect") || "index.html";

    document.addEventListener("DOMContentLoaded", () => {
        const linkRegistro = document.querySelector('a[href="register.html"]');
        if (linkRegistro) {
            linkRegistro.href = "register.html?redirect=" + redirectUrl;
        }
    });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Mostrar loading
        const submitBtn = document.getElementById('submitBtn');
        const loadingAlert = document.getElementById('loadingAlert');
        const errorAlert = document.getElementById('errorAlert');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Iniciando sesión...';
        loadingAlert.style.display = 'block';
        errorAlert.style.display = 'none';
        
        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;
            
            console.log("Login exitoso:", user.email);
            
            // Verificar rol
            const rol = await verificarRolUsuario(user.uid);
            
            if (rol.esAdmin) {
                window.location.href = '../admin/dashboard.html';
            } else {
                window.location.href = redirectUrl.startsWith('http') 
                    ? redirectUrl 
                    : '../' + redirectUrl;
            }
        } catch (error) {
            console.error("Error en login:", error);
            
            let errorMessage = '';
            switch(error.code) {
                case 'auth/user-not-found':
                    errorMessage = 'Usuario no encontrado';
                    break;
                case 'auth/wrong-password':
                    errorMessage = 'Contraseña incorrecta';
                    break;
                case 'auth/invalid-email':
                    errorMessage = 'Correo inválido';
                    break;
                case 'auth/too-many-requests':
                    errorMessage = 'Demasiados intentos. Intenta más tarde';
                    break;
                default:
                    errorMessage = 'Error: ' + error.message;
            }
            
            errorAlert.textContent = errorMessage;
            errorAlert.style.display = 'block';
            loadingAlert.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Iniciar Sesión';
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

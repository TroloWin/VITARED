<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITARED | Registro de Donante</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/public.css">
    <link rel="stylesheet" href="css/login.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="../index.html">
            <img src="../public/images/vitared_logo.png" alt="VITARED" style="width: 140px;">
        </a>
    </div>
</nav>

<!-- REGISTRO -->
<section class="register-section">
    <div class="col-lg-7 col-md-9">
        <div class="register-card">
            <div class="register-header">
                <h2>Registro de Donante</h2>
                <p>Únete a la red VITARED y salva vidas</p>
            </div>

            <div id="debugAlert" class="alert alert-info" style="display: none;"></div>
            <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>
            <div id="loadingAlert" class="alert alert-info" style="display: none;">Procesando registro...</div>

            <form id="registerForm">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Nombre Completo *</label>
                        <input type="text" id="nombre" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Teléfono *</label>
                        <input type="text" id="telefono" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Correo Electrónico *</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Fecha de Nacimiento *</label>
                        <input type="date" id="fechaNacimiento" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Peso (kg) *</label>
                        <input type="number" id="peso" class="form-control" step="0.1" min="30" max="200" required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Tipo de Sangre *</label>
                        <select id="tipoSangre" class="form-select" required>
                            <option value="">Seleccione</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>

                    <div class="col-12 mb-4">
                        <label class="form-label">Localidad *</label>
                        <input type="text" id="localidad" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Contraseña *</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Confirmar Contraseña *</label>
                        <input type="password" id="confirmPassword" class="form-control" required>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label" for="terms">
                        Acepto el <a href="#" class="link-medical">Aviso de Privacidad</a> y 
                        <a href="#" class="link-medical">Términos y Condiciones</a>.
                    </label>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="register-btn" id="submitBtn">
                        REGISTRARME
                    </button>
                </div>

                <div class="text-center">
                    <span class="text-muted">¿Ya tienes cuenta?</span>
                    <a href="login.html" class="link-medical fw-bold">Inicia sesión</a>
                </div>
            </form>
            
            <div class="text-center mt-3">
                <button class="btn btn-sm btn-outline-secondary" onclick="probarFirestore()" type="button">
                    Probar conexión Firestore
                </button>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2025 Donación de Sangre | Proyecto VITARED
</footer>

<script src="../public/js/firebase-config.js"></script>
<script>
    // Función para probar Firestore
    window.probarFirestore = async () => {
        const debugAlert = document.getElementById('debugAlert');
        debugAlert.style.display = 'block';
        debugAlert.textContent = 'Probando conexión a Firestore...';
        
        try {
            const testDoc = db.collection('test').doc('test-' + Date.now());
            await testDoc.set({ 
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                message: "Prueba desde registro"
            });
            debugAlert.textContent = '✅ Firestore funciona correctamente';
            debugAlert.className = 'alert alert-success';
            await testDoc.delete();
        } catch (error) {
            debugAlert.textContent = '❌ Error en Firestore: ' + error.message;
            debugAlert.className = 'alert alert-danger';
            console.error(error);
        }
    };

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Validar contraseñas
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (password !== confirmPassword) {
            document.getElementById('errorAlert').textContent = 'Las contraseñas no coinciden';
            document.getElementById('errorAlert').style.display = 'block';
            return;
        }
        
        // Mostrar loading
        const submitBtn = document.getElementById('submitBtn');
        const loadingAlert = document.getElementById('loadingAlert');
        const errorAlert = document.getElementById('errorAlert');
        const debugAlert = document.getElementById('debugAlert');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Registrando...';
        loadingAlert.style.display = 'block';
        errorAlert.style.display = 'none';
        debugAlert.style.display = 'none';
        
        // Recopilar datos
        const datos = {
            nombre: document.getElementById('nombre').value,
            email: document.getElementById('email').value,
            password: password,
            telefono: document.getElementById('telefono').value,
            fechaNacimiento: document.getElementById('fechaNacimiento').value,
            peso: parseFloat(document.getElementById('peso').value),
            tipoSangre: document.getElementById('tipoSangre').value,
            localidad: document.getElementById('localidad').value
        };
        
        console.log("📤 Enviando registro:", datos);
        
        try {
            const resultado = await registrarDonante(datos);
            console.log("📥 Resultado:", resultado);
            
            loadingAlert.style.display = 'none';
            
            if (resultado.success) {
                debugAlert.textContent = '✅ Registro exitoso! Redirigiendo...';
                debugAlert.className = 'alert alert-success';
                debugAlert.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = '../index.html?registered=true';
                }, 2000);
            } else {
                errorAlert.textContent = 'Error: ' + resultado.error;
                errorAlert.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'REGISTRARME';
            }
        } catch (error) {
            console.error("Error inesperado:", error);
            errorAlert.textContent = 'Error inesperado: ' + error.message;
            errorAlert.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'REGISTRARME';
            loadingAlert.style.display = 'none';
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

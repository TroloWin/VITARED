<style>

<script src="public/js/firebase-config.js"></script>

<script>

async function cargarCentros(){

const container = document.getElementById('centrosContainer');
const centros = await obtenerCentrosDonacion();

if(centros.length === 0){
container.innerHTML = '<p>No hay centros disponibles</p>';
return;
}

let html='';

centros.forEach(centro=>{

html+=`

<div class="card centro-card">
<div class="card-body">

<h4 class="text-danger fw-bold">${centro.nombre}</h4>

<p>
<i class="fas fa-map-marker-alt text-danger"></i>
${centro.direccion || 'Dirección no especificada'}
</p>

<p>
<i class="fas fa-phone text-danger"></i>
${centro.telefono || '—'}
</p>

<p>
<i class="fas fa-clock text-danger"></i>
${centro.horario || 'Lun-Vie 9am-5pm'}
</p>

<button class="btn btn-outline-danger"
onclick="verDisponibilidad('${centro.id}')">
Ver disponibilidad
</button>

</div>
</div>

`;

});

container.innerHTML=html;

}

function iniciarMapa() {

    const lat = 24.05781389373726;
    const lon = -104.643585489177;

    const map = L.map('map').setView([lat, lon], 17);

    L.tileLayer(
        'https://maps.geoapify.com/v1/tile/osm-carto/{z}/{x}/{y}.png?apiKey=5ad8f133a1844efab0a35784772c2a16',
        {
            maxZoom: 20
        }
    ).addTo(map);

    const redIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',

        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    L.marker([lat, lon], {icon: redIcon})
        .addTo(map)
        .bindPopup("Centro Estatal de la Transfusión Sanguínea (CETS) Durango")
        .openPopup();

    
    setTimeout(() => {
        map.invalidateSize();
    }, 200);
}


window.verDisponibilidad=async(centroId)=>{

const fecha=prompt('Fecha YYYY-MM-DD',new Date().toISOString().split('T')[0]);
if(!fecha) return;

const disponibilidad=await obtenerDisponibilidadCentro(centroId,fecha);

if(disponibilidad.disponibles.length===0){
alert('No hay horarios disponibles');
}else{
alert(`Horarios disponibles:\n${disponibilidad.disponibles.join('\n')}`);
}

};

document.addEventListener('DOMContentLoaded',async()=>{

await cargarCentros();
iniciarMapa();

});

</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

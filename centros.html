<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VITARED | Centros de Donación</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="public/css/public.css">

    <!-- Leaflet MAP -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<!-- NAVBAR (EXACTAMENTE IGUAL AL INDEX) -->
<nav class="navbar navbar-expand-lg shadow-sm sticky-top">
    <div class="container py-2">
        <a class="navbar-brand" href="index.html">
            <img src="public/images/vitared_logo.png" alt="VITARED" style="width:140px;">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="requisitos.html">Requisitos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="preguntas.html">Preguntas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="campanas.html">Campañas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="centros.html">Centros</a>
                </li>
            </ul>

            <div class="d-flex align-items-center" id="authButtons">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>
</nav>

<!-- HERO (IGUAL AL DE REQUISITOS/PREGUNTAS) -->
<section class="centros-hero">
    <div class="container text-center">
        <h1 class="fw-bold display-5">Centros de Donación</h1>
        <p class="lead">Encuentra el centro más cercano y agenda tu cita</p>
    </div>
</section>

<!-- CENTROS + MAPA -->
<section class="py-5">
    <div class="container">
        <div class="row">
            <!-- LISTA DE CENTROS -->
            <div class="col-lg-6">
                <div id="centrosContainer">
                    <div class="text-center">
                        <div class="spinner-border text-danger" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- MAPA -->
            <div class="col-lg-6">
                <div id="map" style="height:450px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.1);"></div>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2025 Donación de Sangre | Proyecto VITARED
</footer>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* HERO IGUAL AL DE REQUISITOS Y PREGUNTAS */
.centros-hero {
    height: 35vh;
    background: linear-gradient(rgba(139,0,0,0.7), rgba(179,0,0,0.7)),
                url('public/images/sangr1.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    color: white;
}

/* CARDS PROFESIONALES */
.centro-card {
    transition: all 0.3s ease;
    border-radius: 15px;
    border: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    background: white;
}

.centro-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

.centro-card .card-body {
    padding: 1.5rem;
}

.centro-card h4 {
    margin-bottom: 1rem;
    font-weight: 700;
}

.centro-card p {
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 10px;
}

.centro-card i {
    width: 20px;
    text-align: center;
}

/* BOTONES */
.btn-danger {
    background: linear-gradient(90deg, #8B0000, #b30000);
    border: none;
    transition: 0.3s ease;
    color: white;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: 25px;
}

.btn-danger:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(179,0,0,0.3);
}

.btn-outline-danger {
    border: 2px solid #dc3545;
    color: #dc3545;
    background: transparent;
    transition: 0.3s ease;
    border-radius: 25px;
    padding: 8px 20px;
}

.btn-outline-danger:hover {
    background: #dc3545;
    color: white;
}

/* TEXTO */
.text-danger {
    color: #8B0000 !important;
}

/* MAPA */
#map {
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    border: 1px solid #e0e0e0;
}
</style>

<script src="public/js/firebase-config.js"></script>
<script>
    // CONTROL DE AUTENTICACIÓN (EXACTAMENTE IGUAL AL INDEX)
    auth.onAuthStateChanged(async (user) => {
        const authDiv = document.getElementById('authButtons');
        
        if (user) {
            const rol = await verificarRolUsuario(user.uid);
            
            if (rol.esAdmin) {
                authDiv.innerHTML = `
                    <a href="admin/dashboard.html" class="btn btn-danger register-btn me-2">
                        Admin Panel
                    </a>
                    <button onclick="logout()" class="btn btn-outline-danger login-btn">
                        Cerrar Sesión
                    </button>
                `;
            } else {
                authDiv.innerHTML = `
                    <span class="text-danger me-3">
                        ${user.displayName || 'Usuario'}
                    </span>
                    <a href="perfil.html" class="btn btn-outline-danger login-btn me-2">
                        Mi Perfil
                    </a>
                    <button onclick="logout()" class="btn btn-danger register-btn">
                        Cerrar Sesión
                    </button>
                `;
            }
        } else {
            authDiv.innerHTML = `
                <a href="login/login.html" class="btn btn-outline-danger login-btn me-2">
                    Iniciar Sesión
                </a>
                <a href="login/register.html" class="btn btn-danger register-btn">
                    Registrarse
                </a>
            `;
        }
    });

    // LOGOUT
    window.logout = () => {
        auth.signOut().then(() => {
            window.location.href = "index.html";
        });
    };

    // CARGAR CENTROS
    async function cargarCentros() {
        const container = document.getElementById('centrosContainer');
        
        try {
            const centros = await obtenerCentrosDonacion();

            if (centros.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">No hay centros disponibles</p>';
                return;
            }

            let html = '';

            centros.forEach(centro => {
                html += `
                    <div class="card centro-card">
                        <div class="card-body">
                            <h4 class="text-danger fw-bold">${centro.nombre}</h4>
                            <p>
                                <i class="fas fa-map-marker-alt text-danger"></i>
                                ${centro.direccion || 'Dirección no especificada'}
                            </p>
                            <p>
                                <i class="fas fa-phone text-danger"></i>
                                ${centro.telefono || '—'}
                            </p>
                            <p>
                                <i class="fas fa-clock text-danger"></i>
                                ${centro.horario || 'Lun-Vie 9am-5pm'}
                            </p>
                            <button class="btn btn-outline-danger btn-sm mt-2" onclick="verDisponibilidad('${centro.id}')">
                                Ver disponibilidad
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        } catch (error) {
            console.error("Error cargando centros:", error);
            container.innerHTML = '<p class="text-center text-danger">Error al cargar los centros</p>';
        }
    }

    // VER DISPONIBILIDAD
    window.verDisponibilidad = async (centroId) => {
        const fecha = prompt('Fecha (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
        if (!fecha) return;

        try {
            const disponibilidad = await obtenerDisponibilidadCentro(centroId, fecha);

            if (disponibilidad.disponibles.length === 0) {
                alert('❌ No hay horarios disponibles para esta fecha');
            } else {
                alert(`✅ Horarios disponibles:\n\n${disponibilidad.disponibles.join('\n')}`);
            }
        } catch (error) {
            console.error("Error obteniendo disponibilidad:", error);
            alert("Error al consultar disponibilidad");
        }
    };

    // INICIAR MAPA
    function iniciarMapa() {
        const lat = 24.05781389373726;
        const lon = -104.643585489177;

        const map = L.map('map').setView([lat, lon], 17);

        L.tileLayer(
            'https://maps.geoapify.com/v1/tile/osm-carto/{z}/{x}/{y}.png?apiKey=5ad8f133a1844efab0a35784772c2a16',
            {
                maxZoom: 20,
                attribution: '© OpenStreetMap contributors'
            }
        ).addTo(map);

        const redIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        L.marker([lat, lon], { icon: redIcon })
            .addTo(map)
            .bindPopup(`
                <b>Centro Estatal de la Transfusión Sanguínea (CETS) Durango</b>
                <br><br>
                <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}"
                   target="_blank"
                   class="btn btn-danger btn-sm">
                    Cómo llegar
                </a>
            `)
            .openPopup();

        setTimeout(() => {
            map.invalidateSize();
        }, 200);
    }

    // INICIAR TODO
    document.addEventListener('DOMContentLoaded', async () => {
        await cargarCentros();
        iniciarMapa();
    });
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

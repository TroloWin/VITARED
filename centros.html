<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VITARED | Centros de Donación</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="public/css/public.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm sticky-top">
    <div class="container py-2">
        <a class="navbar-brand" href="index.html">
            <img src="public/images/vitared_logo.png" alt="VITARED" style="width: 140px;">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="requisitos.html">Requisitos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="preguntas.html">Preguntas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="campanas.html">Campañas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="centros.html">Centros</a>
                </li>
            </ul>
            <div class="d-flex align-items-center" id="authButtons">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>
</nav>

<!-- HERO -->
<section class="centros-hero">
    <div class="container text-center">
        <h1 class="fw-bold display-5">Centros de Donación</h1>
        <p class="lead">Encuentra el centro más cercano y agenda tu cita</p>
    </div>
</section>

<!-- LISTA DE CENTROS -->
<section class="py-5">
    <div class="container">
        <div id="centrosContainer" class="row">
            <div class="col-12 text-center">
                <div class="spinner-border text-danger" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2025 Donación de Sangre | Proyecto VITARED
</footer>

<style>
.centros-hero {
    height: 35vh;
    background: linear-gradient(rgba(139,0,0,0.7), rgba(179,0,0,0.7)),
                url('public/images/sangr1.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    color: white;
}

.centro-card {
    transition: all 0.3s ease;
    border-radius: 15px;
    overflow: hidden;
    height: 100%;
    border: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.centro-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}
</style>

<script src="public/js/firebase-config.js"></script>
<script>
    async function cargarCentros() {
        const container = document.getElementById('centrosContainer');
        const centros = await obtenerCentrosDonacion();
        
        if (centros.length === 0) {
            container.innerHTML = '<p class="text-center">No hay centros disponibles</p>';
            return;
        }
        
        let html = '';
        centros.forEach(centro => {
            html += `
                <div class="col-md-6 mb-4">
                    <div class="card centro-card">
                        <div class="card-body">
                            <h4 class="text-danger fw-bold">${centro.nombre}</h4>
                            <p class="mb-2"><i class="fas fa-map-marker-alt text-danger me-2"></i> ${centro.direccion || 'Dirección no especificada'}</p>
                            <p class="mb-2"><i class="fas fa-phone text-danger me-2"></i> ${centro.telefono || '—'}</p>
                            <p class="mb-3"><i class="fas fa-clock text-danger me-2"></i> ${centro.horario || 'Lun-Vie 9am-5pm'}</p>
                            <button class="btn btn-outline-danger" onclick="verDisponibilidad('${centro.id}')">
                                Ver disponibilidad
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    window.verDisponibilidad = async (centroId) => {
        const fecha = prompt('Fecha (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
        if (!fecha) return;
        
        const disponibilidad = await obtenerDisponibilidadCentro(centroId, fecha);
        
        if (disponibilidad.disponibles.length === 0) {
            alert('No hay horarios disponibles para esta fecha');
        } else {
            alert(`Horarios disponibles:\n${disponibilidad.disponibles.join('\n')}`);
        }
    };

    // Control de autenticación
    auth.onAuthStateChanged(async (user) => {
        const authDiv = document.getElementById('authButtons');
        
        if (user) {
            const rol = await verificarRolUsuario(user.uid);
            
            if (rol.esAdmin) {
                authDiv.innerHTML = `
                    <a href="admin/dashboard.html" class="btn btn-danger register-btn me-2">
                        Admin Panel
                    </a>
                    <button onclick="logout()" class="btn btn-outline-danger login-btn">
                        Cerrar Sesión
                    </button>
                `;
            } else {
                authDiv.innerHTML = `
                    <span class="text-danger me-3">
                        <i class="fas fa-user"></i> ${user.displayName}
                    </span>
                    <a href="perfil.html" class="btn btn-outline-danger login-btn me-2">
                        Mi Perfil
                    </a>
                    <button onclick="logout()" class="btn btn-danger register-btn">
                        Cerrar Sesión
                    </button>
                `;
            }
        } else {
            authDiv.innerHTML = `
                <a href="login/login.html" class="btn btn-outline-danger login-btn me-2">
                    Iniciar Sesión
                </a>
                <a href="login/register.html" class="btn btn-danger register-btn">
                    Registrarse
                </a>
            `;
        }
    });

    window.logout = () => {
        auth.signOut();
        window.location.href = 'index.html';
    };

    // Cargar centros al iniciar
    document.addEventListener('DOMContentLoaded', cargarCentros);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
